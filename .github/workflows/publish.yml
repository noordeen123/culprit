name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) when you cut a GitHub Release.
# No API tokens needed - PyPI verifies this exact repo + workflow + environment.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi              # must match the environment configured on PyPI + in repo settings
    permissions:
      id-token: write              # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags so setuptools-scm can derive the version
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
